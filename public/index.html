<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>TaskPay — Earn Points, Get Paid</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta19/dist/css/tabler.min.css"/>
  <style>
    body { background: #f0f4f8; }
    .auth-card { max-width: 440px; margin: 80px auto; }
    .brand-logo { font-size: 2rem; font-weight: 800; color: #206bc4; letter-spacing: -1px; }
    .hero-stat { text-align: center; padding: 12px; }
    .hero-stat .num { font-size: 1.75rem; font-weight: 700; color: #206bc4; }
    .hero-stat .lbl { font-size: 0.8rem; color: #667; text-transform: uppercase; letter-spacing: .5px; }
  </style>
</head>
<body class="antialiased">
<div class="container-tight py-4">
  <div class="text-center mb-4">
    <div class="brand-logo">💰 TaskPay</div>
    <p class="text-muted mt-1">Complete tasks. Earn points. Get paid via PayPal.</p>
  </div>

  <div class="row g-3 mb-4">
    <div class="col-4"><div class="card hero-stat"><div class="num">100pts</div><div class="lbl">= $1.00</div></div></div>
    <div class="col-4"><div class="card hero-stat"><div class="num">$5 min</div><div class="lbl">Cashout</div></div></div>
    <div class="col-4"><div class="card hero-stat"><div class="num">PayPal</div><div class="lbl">Payouts</div></div></div>
  </div>

  <div class="card auth-card">
    <div class="card-header">
      <ul class="nav nav-tabs card-header-tabs" id="authTabs">
        <li class="nav-item"><a class="nav-link active" href="#" data-tab="login">Sign In</a></li>
        <li class="nav-item"><a class="nav-link" href="#" data-tab="register">Create Account</a></li>
      </ul>
    </div>
    <div class="card-body">
      <div id="alertBox" class="alert d-none mb-3"></div>

      <!-- LOGIN -->
      <form id="loginForm">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" id="loginEmail" placeholder="you@example.com" required/>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" id="loginPassword" placeholder="Your password" required/>
        </div>
        <button type="submit" class="btn btn-primary w-100">Sign In</button>
      </form>

      <!-- REGISTER -->
      <form id="registerForm" class="d-none">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" class="form-control" id="regUsername" placeholder="cooluser123" minlength="3" maxlength="20" required/>
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" id="regEmail" placeholder="you@example.com" required/>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" id="regPassword" placeholder="Min 8 characters" minlength="8" required/>
        </div>
        <button type="submit" class="btn btn-success w-100">Create Account</button>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta19/dist/js/tabler.min.js"></script>
<script>
  // Redirect if already logged in
  if (localStorage.getItem('tp_token')) window.location.href = '/dashboard';

  const tabs = document.querySelectorAll('[data-tab]');
  const loginForm = document.getElementById('loginForm');
  const registerForm = document.getElementById('registerForm');

  tabs.forEach(tab => tab.addEventListener('click', e => {
    e.preventDefault();
    tabs.forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    if (tab.dataset.tab === 'login') {
      loginForm.classList.remove('d-none');
      registerForm.classList.add('d-none');
    } else {
      loginForm.classList.add('d-none');
      registerForm.classList.remove('d-none');
    }
  }));

  function showAlert(msg, type = 'danger') {
    const box = document.getElementById('alertBox');
    box.className = `alert alert-${type} mb-3`;
    box.textContent = msg;
  }

  loginForm.addEventListener('submit', async e => {
    e.preventDefault();
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: loginEmail.value, password: loginPassword.value })
    });
    const data = await res.json();
    if (!res.ok) return showAlert(data.error || 'Login failed');
    localStorage.setItem('tp_token', data.token);
    localStorage.setItem('tp_user', JSON.stringify(data.user));
    window.location.href = '/dashboard';
  });

  registerForm.addEventListener('submit', async e => {
    e.preventDefault();
    const res = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: regEmail.value, username: regUsername.value, password: regPassword.value })
    });
    const data = await res.json();
    if (!res.ok) return showAlert(data.error || 'Registration failed');
    localStorage.setItem('tp_token', data.token);
    localStorage.setItem('tp_user', JSON.stringify(data.user));
    window.location.href = '/dashboard';
  });
</script>
</body>
</html>
